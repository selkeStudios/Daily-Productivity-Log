name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./src
        run: npm ci

      - name: Create CI test config
        run: |
          if [ ! -f src/config.js ]; then
            echo 'export const GEMINI_API_KEY = "";' > src/config.js
          fi

      - name: Run unit tests
        working-directory: ./src
        run: npm test

      - name: Verify extension files
        run: |
          test -f src/manifest.json && echo "✓ manifest.json"
          test -f src/background.js && echo "✓ background.js"
          test -f src/popup.html && echo "✓ popup.html"
          test -f src/popup.js && echo "✓ popup.js"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install pytest
        run: pip install pytest

      - name: Run Python tests
        run: pytest src/test_popup.py -v

      - name: Log in to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gander-extension:latest