<!doctype html>
<html lang="en">
  <head>
    <title>Gander</title>

    <link rel="stylesheet" href="popup.css">
  </head>

  <body>
    <!-- Shown until the user completes Google sign-in -->
    <section id="auth-view" class="auth-view panel" aria-labelledby="auth-heading">
      <div class="auth-brand">
        <img class="auth-logo" src="icons/icon48.png" alt="" width="48" height="48">
        <h1 id="auth-heading" class="auth-title">Welcome to Gander</h1>
        <p class="auth-lede">Sign in with Google to sync your account and send productivity reports from Gmail.</p>
      </div>
      <button type="button" id="loginGoogle" class="google-sign-in-button">
        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
      <p id="authStatus" class="auth-status" aria-live="polite"></p>
    </section>

    <!-- Main dashboard -->
    <div id="main-view" class="main-view hidden">
      <div class="header">
        <div class="header-top">
          <div class="header-titles">
            <h2 id="headerTitle">Gander</h2>
            <span class="subtitle">Gander - Productivity Tracker</span>
          </div>
          <button type="button" id="signOutBtn" class="sign-out-button">Sign out</button>
        </div>
      </div>

      <div class="section">
        <h3>Time Spent</h3>
        <div id="typedUrl_div">Calculating...</div>
      </div>

      <div class="section">
        <h3>Quick Stats</h3>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-number" id="totalSites">--</div>
            <div class="stat-label">Sites</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="totalTime">--</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
      </div>

      <div class="button-stack">
        <button id="runDailyLog" class="action-button secondary">Debug Run</button>
        <button id="sendEmail" class="action-button">Send Report</button>
      </div>
    </div>

    <div id="statusMessage" class="status-message" aria-live="polite"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
