<!doctype html>
<html lang="en">

<head>
  <title>Gander</title>

  <!-- App header with title and description -->
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="header">
    <h2>Gander</h2>
    <span class="subtitle">Productivity Tracker</span>
  </div>

  <!-- Browsing history time breakdown -->
  <div class="section">
    <h3>Time Spent (Last 24h)</h3>
    <div id="typedUrl_div">Calculating...</div>
  </div>

  <!-- Quick overview stats -->
  <div class="section">
    <h3>Quick Stats</h3>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-number" id="totalSites">--</div>
        <div class="stat-label">Sites</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="totalTime">--</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
  </div>

  <!-- Category summary -->
  <div class="section">
    <h3>Category Summary</h3>
    <div id="summary_div">Waiting for summary...</div>
  </div>

  <!-- Recommendations -->
  <div class="section">
    <h3>Recommendations</h3>
    <div id="recommendation_div">Waiting for recommendations...</div>
  </div>

  <!-- Email report trigger -->
  <button id="sendEmail">Send Report</button>

  <script src="popup.js"></script>
</body>

</html>
