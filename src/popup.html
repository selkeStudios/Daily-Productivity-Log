<!doctype html>
<html lang="en">
  <head>
    <title>Gander</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div id="checkingView" class="view checking-view" aria-live="polite">
      <p class="checking-text">Loading…</p>
    </div>

    <div id="authView" class="view auth-view hidden" aria-labelledby="authTitle">
      <div class="auth-card">
        <div class="auth-brand">
          <h1 id="authTitle" class="auth-title">Gander</h1>
          <p class="auth-tagline">Productivity tracker</p>
        </div>
        <p class="auth-lead">
          Sign in with Google to send daily reports from your Gmail account.
        </p>
        <button type="button" id="loginGoogle" class="btn-google" aria-label="Sign in with Google">
          <span class="btn-google-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.82 7.14l7.75 6.01C44.28 37.03 46.98 31.24 46.98 24.55z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.75-6.01c-2.16 1.45-4.92 2.3-8.14 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
          </span>
          <span class="btn-google-label">Sign in with Google</span>
        </button>
        <div id="authStatusMessage" class="status-message" aria-live="polite"></div>
      </div>
    </div>

    <div id="appView" class="view hidden">
      <div class="header">
        <div class="header-row">
          <div>
            <h2>Gander</h2>
            <span class="subtitle">Gander - Productivity Tracker</span>
          </div>
          <button type="button" id="signOut" class="link-button">Sign out</button>
        </div>
      </div>

      <div class="section">
        <h3>Time Spent</h3>
        <div id="typedUrl_div">Calculating...</div>
      </div>

      <div class="section">
        <h3>Quick Stats</h3>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-number" id="totalSites">--</div>
            <div class="stat-label">Sites</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="totalTime">--</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
      </div>

      <div class="button-stack">
        <button id="runDailyLog" class="action-button secondary">Debug Run</button>
        <button id="sendEmail" class="action-button">Send Report</button>
      </div>
      <div id="statusMessage" class="status-message" aria-live="polite"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
